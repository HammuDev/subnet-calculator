version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: subnet-calculator-frontend
    environment:
      - PORT=3000
      - NODE_ENV=production
    networks:
      - subnet-net
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: subnet-calculator-backend
    environment:
      - PORT=5000
      - NODE_ENV=production
    networks:
      - subnet-net
    restart: always

  nginx:
    image: nginx:stable-alpine
    container_name: subnet-calculator-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - subnet-net
    restart: always

networks:
  subnet-net:
    driver: bridge
