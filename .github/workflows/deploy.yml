name: Deploy Subnet Calculator to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1                  
  ECR_REPOSITORY: subnet-calculator       
  ECS_CLUSTER: subnet-cluster             
  ECS_SERVICE: subnet-service             
  ECS_TASK_DEFINITION: subnet-task        

jobs:
  deploy:
    name: Build, Push and Update ECS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Download active Task Definition
      run: |
        aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION }} --query taskDefinition > task-definition.json

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: subnet-container 
        image: ${{ steps.build-image.outputs.image }}

    # ==========================================
    # FIXED: Flawed action ki jagah direct AWS CLI forcing deployment
    # ==========================================
    - name: Register and Deploy to ECS via AWS CLI
      run: |
        # 1. Nayi image ke sath task definition ko register karo
        NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json file://${{ steps.task-def.outputs.task-definition }} --query 'taskDefinition.taskDefinitionArn' --output text)
        
        # 2. Service ko enforce karo ke naye task configuration par update ho jaye
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --task-definition $NEW_TASK_ARN --force-new-deployment --region ${{ env.AWS_REGION }}